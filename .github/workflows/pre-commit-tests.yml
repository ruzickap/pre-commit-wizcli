name: pre-commit-tests

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
      - "!chore/renovate/*"
    paths:
      - .pre-commit-hooks.yaml
      - .github/workflows/pre-commit-tests.yml
      - tests/**

defaults:
  run:
    shell: bash -euxo pipefail {0}

permissions: read-all

jobs:
  pre-commit-test:
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-24.04-arm, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🔧 Install WizCLI
        run: |
          OPERATING_SYSTEM="$(uname | tr '[:upper:]' '[:lower:]')"
          ARCHITECTURE="$(uname -m)"
          case "${ARCHITECTURE}" in
            x86_64)  ARCHITECTURE="amd64" ;;
            aarch64) ARCHITECTURE="arm64" ;;
          esac
          curl -Lo /usr/local/bin/wizcli "https://downloads.wiz.io/v1/wizcli/latest/wizcli-${OPERATING_SYSTEM}-${ARCHITECTURE}"
          chmod a+x /usr/local/bin/wizcli

      - uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4
        with:
          install-only: true

      - name: 🧪 Run tests (tests/run-all-tests.sh)
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          ./tests/run-all-tests.sh
